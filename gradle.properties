# trustStoreType=Windows-ROOT lets the JVM use the Windows certificate store, so
# dependency downloads work behind a TLS-intercepting proxy/VPN (Java's own cacerts
# does not trust the proxy's root CA). Safe to remove on a machine without such a proxy.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djavax.net.ssl.trustStoreType=Windows-ROOT
org.gradle.caching=true
org.gradle.configuration-cache=false
kotlin.stdlib.default.dependency=false
